<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Профиль — ITКурсы</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <div id="app-header"></div>
  <main>
    <div class="page-hero">
      <div class="container">
        <h1>Личный кабинет</h1>
        <p>Управляйте своим обучением и профилем</p>
      </div>
    </div>
    <section style="padding: 56px 0 100px;">
      <div class="container">
        <div id="profileContent"></div>
      </div>
    </section>
  </main>
  <div id="app-footer"></div>
  <div id="toast-container"></div>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
    function pageInit() {
      const user = Storage.auth.getCurrentUser();
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      const myCourses = (user.courses || []).map(id => COURSES.find(c => c.id === id)).filter(Boolean);

      document.getElementById("profileContent").innerHTML = `
        <div class="profile-layout">
          <!-- SIDEBAR -->
          <aside class="profile-sidebar">
            <div class="profile-sidebar__avatar">
              ${user.avatar}
            </div>
            <div class="profile-sidebar__name">${user.name}</div>
            <div class="profile-sidebar__email">${user.email}</div>
            <div class="profile-sidebar__since">На платформе с ${user.createdAt}</div>

            <div class="profile-sidebar__progress">
              <div class="profile-sidebar__progress-header">
                <span>Прогресс</span>
                <span>${myCourses.length} курсов</span>
              </div>
              <div class="profile-sidebar__progress-bar">
                <div class="profile-sidebar__progress-fill" style="width:${Math.min(myCourses.length * 10, 100)}%"></div>
              </div>
            </div>

            <nav class="profile-nav">
              <a href="#" class="active" data-tab="overview">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                Обзор
              </a>
              <a href="#" data-tab="courses">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                Мои курсы
              </a>
              <a href="#" data-tab="certificates">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15a7 7 0 1 0 0-14 7 7 0 0 0 0 14z"/><path d="M8.21 13.89 7 23l5-3 5 3-1.21-9.12"/></svg>
                Сертификаты
              </a>
              <a href="#" data-tab="settings">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                Настройки
              </a>
              <a href="#" id="logoutBtn" class="profile-nav__logout">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Выйти
              </a>
            </nav>
          </aside>

          <!-- CONTENT -->
          <div class="profile-content">
            <!-- OVERVIEW TAB -->
            <div class="profile-tab active" id="tab-overview">
              <h3 class="profile-section-title">Обзор аккаунта</h3>

              <div class="profile-stats-grid">
                <div class="profile-stat-card profile-stat-card--primary">
                  <div class="profile-stat-card__icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c0 2 2 3 6 3s6-1 6-3v-5"/></svg>
                  </div>
                  <div class="profile-stat-card__num">${myCourses.length}</div>
                  <div class="profile-stat-card__label">Курсов куплено</div>
                </div>
                <div class="profile-stat-card profile-stat-card--success">
                  <div class="profile-stat-card__icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15a7 7 0 1 0 0-14 7 7 0 0 0 0 14z"/><path d="M8.21 13.89 7 23l5-3 5 3-1.21-9.12"/></svg>
                  </div>
                  <div class="profile-stat-card__num">${myCourses.length}</div>
                  <div class="profile-stat-card__label">Сертификатов</div>
                </div>
                <div class="profile-stat-card profile-stat-card--warning">
                  <div class="profile-stat-card__icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                  </div>
                  <div class="profile-stat-card__num">0</div>
                  <div class="profile-stat-card__label">Дней учёбы</div>
                </div>
              </div>

              ${myCourses.length > 0 ? `
                <h4 style="font-size:1.05rem; font-weight:700; margin-bottom:20px; margin-top:8px;">Продолжить обучение</h4>
                <div style="display:flex; flex-direction:column; gap:12px;">
                  ${myCourses.slice(0, 3).map(c => `
                    <div class="profile-course-row">
                      <div class="profile-course-row__icon" style="background:linear-gradient(135deg, ${c.color}18, ${c.color}30);">
                        ${c.icon ? c.icon.replace(/width="52"/g, 'width="28"').replace(/height="52"/g, 'height="28"') : ''}
                      </div>
                      <div class="profile-course-row__info">
                        <div class="profile-course-row__title">${c.title}</div>
                        <div class="profile-course-row__progress">
                          <div class="profile-course-row__progress-bar">
                            <div class="profile-course-row__progress-fill" style="width:${Math.floor(Math.random()*60+20)}%"></div>
                          </div>
                          <span>${Math.floor(Math.random()*60+20)}%</span>
                        </div>
                      </div>
                      <a href="course.html?id=${c.id}" class="btn btn-outline btn-sm">Продолжить</a>
                    </div>
                  `).join("")}
                </div>
              ` : `
                <div class="profile-empty-hint">
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                  <span>Вы ещё не купили ни одного курса. <a href="catalog.html" style="color:var(--primary); font-weight:600;">Перейти в каталог →</a></span>
                </div>
              `}
            </div>

            <!-- COURSES TAB -->
            <div class="profile-tab" id="tab-courses">
              <h3 class="profile-section-title">Мои курсы (${myCourses.length})</h3>
              ${myCourses.length === 0 ? `
                <div class="empty-state">
                  <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5" style="margin-bottom:20px;"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                  <h3>Курсов пока нет</h3>
                  <p>Добавьте курсы в корзину и оплатите их</p>
                  <a href="catalog.html" class="btn btn-primary">Перейти в каталог</a>
                </div>
              ` : `
                <div class="courses-grid">
                  ${myCourses.map(c => renderCourseCard(c)).join("")}
                </div>
              `}
            </div>

            <!-- CERTIFICATES TAB -->
            <div class="profile-tab" id="tab-certificates">
              <h3 class="profile-section-title">Мои сертификаты (${myCourses.length})</h3>
              ${myCourses.length === 0 ? `
                <div class="empty-state">
                  <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5" style="margin-bottom:20px;"><path d="M12 15a7 7 0 1 0 0-14 7 7 0 0 0 0 14z"/><path d="M8.21 13.89 7 23l5-3 5 3-1.21-9.12"/></svg>
                  <h3>Сертификатов пока нет</h3>
                  <p>Завершите курс, чтобы получить сертификат</p>
                </div>
              ` : `
                <div style="display:flex; flex-direction:column; gap:14px;">
                  ${myCourses.map(c => `
                    <div class="profile-certificate-item">
                      <div class="profile-certificate-item__icon">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="1.5"><path d="M12 15a7 7 0 1 0 0-14 7 7 0 0 0 0 14z"/><path d="M8.21 13.89 7 23l5-3 5 3-1.21-9.12"/></svg>
                      </div>
                      <div class="profile-certificate-item__info">
                        <div class="profile-certificate-item__title">${c.title}</div>
                        <div class="profile-certificate-item__id">Сертификат #IT-${c.id * 1000 + (user.id || 1)}</div>
                      </div>
                      <a href="certificate.html?course=${c.id}" class="btn btn-outline btn-sm">
                        Посмотреть
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                      </a>
                    </div>
                  `).join("")}
                </div>
              `}
            </div>

            <!-- SETTINGS TAB -->
            <div class="profile-tab" id="tab-settings">
              <h3 class="profile-section-title">Настройки профиля</h3>
              <form id="profileSettingsForm" style="max-width:520px;">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:18px;">
                  <div class="form-group">
                    <label class="form-label">Имя</label>
                    <input type="text" class="form-control" id="settingsName" value="${user.name}">
                  </div>
                  <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" id="settingsEmail" value="${user.email}">
                  </div>
                </div>
                <div class="form-group">
                  <label class="form-label">О себе</label>
                  <textarea class="form-control" id="settingsBio" rows="3" placeholder="Расскажите о себе...">${user.bio || ""}</textarea>
                </div>
                <div style="display:flex; gap:14px; flex-wrap:wrap; margin-top:28px;">
                  <button type="submit" class="btn btn-primary">Сохранить изменения</button>
                  <button type="button" class="btn btn-outline" id="changeThemeBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                    Сменить тему
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      `;

      // Tab switching
      document.querySelectorAll(".profile-nav a[data-tab]").forEach(link => {
        link.addEventListener("click", e => {
          e.preventDefault();
          const tab = link.dataset.tab;
          document.querySelectorAll(".profile-nav a[data-tab]").forEach(a => a.classList.remove("active"));
          document.querySelectorAll(".profile-tab").forEach(t => t.classList.remove("active"));
          link.classList.add("active");
          document.getElementById(`tab-${tab}`)?.classList.add("active");
        });
      });

      // Logout
      document.getElementById("logoutBtn")?.addEventListener("click", e => {
        e.preventDefault();
        Storage.auth.logout();
        showToast("Вы вышли из аккаунта", "info");
        setTimeout(() => window.location.href = "../index.html", 1000);
      });

      // Avatar picker — убран, т.к. использовал эмодзи
      let selAvatar = user.avatar;

      // Save settings
      document.getElementById("profileSettingsForm")?.addEventListener("submit", e => {
        e.preventDefault();
        Storage.auth.updateUser({
          name: document.getElementById("settingsName").value,
          email: document.getElementById("settingsEmail").value,
          bio: document.getElementById("settingsBio").value,
          avatar: selAvatar
        });
        showToast("Профиль обновлён!", "success");
        setTimeout(() => window.location.reload(), 800);
      });

      // Theme toggle
      document.getElementById("changeThemeBtn")?.addEventListener("click", () => {
        const t = Storage.theme.get() === "dark" ? "light" : "dark";
        Storage.theme.set(t);
        document.documentElement.setAttribute("data-theme", t);
        showToast(`Тема изменена: ${t === "dark" ? "Тёмная" : "Светлая"}`, "info");
      });

      initCartButtons();
      initScrollAnimations();
    }
  </script>
</body>
</html>
