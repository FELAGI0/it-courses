<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — ITКурсы</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <div id="app-header"></div>
  <main>
    <section style="padding: calc(var(--nav-height) + 60px) 0 100px;">
      <div class="container">
        <div class="form-card">
          <div style="text-align:center; margin-bottom:12px;">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          </div>
          <h2 style="text-align:center;">Добро пожаловать!</h2>
          <p class="subtitle" style="text-align:center;">Войдите в свой аккаунт</p>
          <div id="loginAlert" style="display:none;" class="alert alert-danger mb-3"></div>
          <form id="loginForm">
            <div class="form-group">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" id="loginEmail" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
              <label class="form-label">Пароль</label>
              <input type="password" class="form-control" id="loginPassword" placeholder="Введите пароль" required>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:22px;">
              <label class="form-check">
                <input type="checkbox"> Запомнить меня
              </label>
              <a href="#" class="form-link" style="font-size:0.85rem;">Забыли пароль?</a>
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-lg">Войти</button>
            <div class="form-divider">или</div>
            <div style="text-align:center; font-size:0.9rem;">
              Нет аккаунта? <a href="register.html" class="form-link">Зарегистрируйтесь</a>
            </div>
          </form>
        </div>
      </div>
    </section>
  </main>
  <div id="app-footer"></div>
  <div id="toast-container"></div>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
    function pageInit() {
      if (Storage.auth.isLoggedIn()) {
        window.location.href = "profile.html";
        return;
      }
      document.getElementById("loginForm").addEventListener("submit", function(e) {
        e.preventDefault();
        const email = document.getElementById("loginEmail").value;
        const password = document.getElementById("loginPassword").value;
        const result = Storage.auth.login(email, password);
        const alertEl = document.getElementById("loginAlert");
        if (result.success) {
          showToast("Добро пожаловать, " + result.user.name + "!", "success");
          setTimeout(() => window.location.href = "profile.html", 800);
        } else {
          alertEl.style.display = "flex";
          alertEl.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg> ${result.message}`;
        }
      });
    }
  </script>
</body>
</html>
