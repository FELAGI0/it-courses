<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — ITКурсы</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <div id="app-header"></div>
  <main>
    <section class="section">
      <div class="container">
        <div class="form-card">
          <div style="text-align:center; margin-bottom:8px; font-size:2.5rem;">👋</div>
          <h2 style="text-align:center;">Добро пожаловать!</h2>
          <p class="subtitle" style="text-align:center;">Войдите в свой аккаунт</p>
          <div id="loginAlert" style="display:none;" class="alert alert-danger mb-3"></div>
          <form id="loginForm">
            <div class="form-group">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" id="loginEmail" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
              <label class="form-label">Пароль</label>
              <input type="password" class="form-control" id="loginPassword" placeholder="Введите пароль" required>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
              <label class="form-check">
                <input type="checkbox"> Запомнить меня
              </label>
              <a href="#" class="form-link" style="font-size:0.85rem;">Забыли пароль?</a>
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-lg">Войти</button>
            <div class="form-divider">или</div>
            <div style="text-align:center; font-size:0.9rem;">
              Нет аккаунта? <a href="register.html" class="form-link">Зарегистрируйтесь</a>
            </div>
          </form>
        </div>
      </div>
    </section>
  </main>
  <div id="app-footer"></div>
  <div id="toast-container"></div>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
    function pageInit() {
      if (Storage.auth.isLoggedIn()) {
        window.location.href = "profile.html";
        return;
      }
      document.getElementById("loginForm").addEventListener("submit", function(e) {
        e.preventDefault();
        const email = document.getElementById("loginEmail").value;
        const password = document.getElementById("loginPassword").value;
        const result = Storage.auth.login(email, password);
        const alertEl = document.getElementById("loginAlert");
        if (result.success) {
          showToast("Добро пожаловать, " + result.user.name + "!", "success");
          setTimeout(() => window.location.href = "profile.html", 800);
        } else {
          alertEl.style.display = "flex";
          alertEl.innerHTML = "❌ " + result.message;
        }
      });
    }
  </script>
</body>
</html>
