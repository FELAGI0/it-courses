<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Категории — ITКурсы</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <div id="app-header"></div>
  <main>
    <div class="page-hero">
      <div class="container">
        <div class="breadcrumb"><a href="../index.html">Главная</a><span class="breadcrumb-sep">›</span>Категории</div>
        <h1>Категории курсов</h1>
        <p>Выберите направление и начните обучение</p>
      </div>
    </div>
    <section class="section">
      <div class="container">
        <div class="categories-grid" id="allCategories" style="grid-template-columns:repeat(auto-fill,minmax(280px,1fr))"></div>
        <div class="section" style="padding-top:60px;">
          <div class="section-header">
            <h2 class="section-title">Все направления подробнее</h2>
          </div>
          <div id="categoryDetails"></div>
        </div>
      </div>
    </section>
  </main>
  <div id="app-footer"></div>
  <div id="toast-container"></div>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
    function pageInit() {
      const grid = document.getElementById("allCategories");
      grid.innerHTML = CATEGORIES.map(cat => `
        <a href="catalog.html?category=${cat.id}" class="category-card" style="border-color:${cat.color}40; padding:36px 28px;">
          <div class="category-icon" style="font-size:3rem; margin-bottom:16px;">${cat.icon}</div>
          <div class="category-name" style="font-size:1.15rem;">${cat.name}</div>
          <div class="category-count" style="margin-top:8px;">${cat.count} курсов</div>
          <div style="margin-top:12px; width:40px; height:3px; background:${cat.color}; border-radius:2px; margin-left:auto; margin-right:auto;"></div>
        </a>
      `).join("");

      const details = document.getElementById("categoryDetails");
      details.innerHTML = CATEGORIES.map(cat => {
        const courses = COURSES.filter(c => c.category === cat.id).slice(0, 3);
        return `
          <div style="margin-bottom:48px; padding:32px; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-xl);">
            <div style="display:flex; align-items:center; gap:12px; margin-bottom:24px;">
              <span style="font-size:2rem;">${cat.icon}</span>
              <div>
                <h3 style="font-size:1.3rem; font-weight:800;">${cat.name}</h3>
                <span style="color:var(--text-muted); font-size:0.88rem;">${cat.count} курсов доступно</span>
              </div>
              <a href="catalog.html?category=${cat.id}" class="btn btn-outline btn-sm" style="margin-left:auto;">Все курсы →</a>
            </div>
            <div class="courses-grid">
              ${courses.map(c => renderCourseCard(c)).join("")}
            </div>
          </div>
        `;
      }).join("");

      initCartButtons();
    }
  </script>
</body>
</html>
