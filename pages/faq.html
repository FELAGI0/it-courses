<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FAQ — ITКурсы</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <div id="app-header"></div>
  <main>
    <div class="page-hero">
      <div class="container">
        <div class="breadcrumb"><a href="../index.html">Главная</a><span class="breadcrumb-sep">›</span>FAQ</div>
        <h1>Часто задаваемые вопросы</h1>
        <p>Ответы на самые популярные вопросы о платформе</p>
      </div>
    </div>
    <section class="section">
      <div class="container">
        <div style="max-width:520px; margin:0 auto 52px;">
          <div class="search-box" style="margin:0;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <input type="text" id="faqSearch" placeholder="Найти вопрос...">
          </div>
        </div>
        <div class="faq-list" id="faqList"></div>
        <div id="faqEmpty" style="display:none;" class="empty-state">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5" style="margin-bottom:16px;"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          <h3>Ничего не найдено</h3>
          <p>Не нашли ответ? <a href="contact.html" class="form-link">Напишите нам</a></p>
        </div>
        <div style="text-align:center; margin-top:64px; padding:48px 32px; background:var(--bg-secondary); border-radius:var(--radius-xl); border:1px solid var(--border);">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="1.5" style="margin-bottom:20px;"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <h3 style="font-size:1.3rem; font-weight:700; margin-bottom:8px;">Не нашли ответ?</h3>
          <p style="color:var(--text-muted); margin-bottom:24px;">Свяжитесь с нашей командой поддержки — мы ответим в течение 2 часов</p>
          <a href="contact.html" class="btn btn-primary">Написать в поддержку</a>
        </div>
      </div>
    </section>
  </main>
  <div id="app-footer"></div>
  <div id="toast-container"></div>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
    function pageInit() {
      function renderFaq(items) {
        const list = document.getElementById("faqList");
        const empty = document.getElementById("faqEmpty");
        if (items.length === 0) {
          list.innerHTML = "";
          empty.style.display = "block";
          return;
        }
        empty.style.display = "none";
        list.innerHTML = items.map((item, i) => `
          <div class="faq-item" id="faq-${i}">
            <div class="faq-question" onclick="toggleFaq(${i})">
              <span>${item.question}</span>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0; transition:transform var(--transition-base);"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
            <div class="faq-answer">
              <div class="faq-answer-inner">${item.answer}</div>
            </div>
          </div>
        `).join("");
      }

      window.toggleFaq = function(i) {
        const item = document.getElementById(`faq-${i}`);
        const wasOpen = item.classList.contains("open");
        document.querySelectorAll(".faq-item").forEach(el => { el.classList.remove("open"); el.querySelector('svg').style.transform = 'rotate(0deg)'; });
        if (!wasOpen) {
          item.classList.add("open");
          item.querySelector('svg').style.transform = 'rotate(180deg)';
        }
      };

      document.getElementById("faqSearch").addEventListener("input", e => {
        const q = e.target.value.toLowerCase();
        const filtered = q ? FAQ_DATA.filter(f => f.question.toLowerCase().includes(q) || f.answer.toLowerCase().includes(q)) : FAQ_DATA;
        renderFaq(filtered);
      });

      renderFaq(FAQ_DATA);
    }
  </script>
</body>
</html>
