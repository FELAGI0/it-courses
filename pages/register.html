<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация — ITКурсы</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <div id="app-header"></div>
  <main>
    <section style="padding: calc(var(--nav-height) + 60px) 0 100px;">
      <div class="container">
        <div class="form-card" style="max-width:520px;">
          <div style="text-align:center; margin-bottom:12px;">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
          </div>
          <h2 style="text-align:center;">Создать аккаунт</h2>
          <p class="subtitle" style="text-align:center;">Начните обучение бесплатно</p>
          <div id="registerAlert" style="display:none;" class="alert alert-danger mb-3"></div>
          <form id="registerForm">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
              <div class="form-group">
                <label class="form-label">Имя</label>
                <input type="text" class="form-control" id="regFirstName" placeholder="Иван" required>
              </div>
              <div class="form-group">
                <label class="form-label">Фамилия</label>
                <input type="text" class="form-control" id="regLastName" placeholder="Петров" required>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" id="regEmail" placeholder="ivan@example.com" required>
            </div>
            <div class="form-group">
              <label class="form-label">Пароль</label>
              <input type="password" class="form-control" id="regPassword" placeholder="Минимум 6 символов" required minlength="6">
              <div class="form-hint">Минимум 6 символов</div>
            </div>
            <div class="form-group">
              <label class="form-label">Подтвердите пароль</label>
              <input type="password" class="form-control" id="regPassword2" placeholder="Повторите пароль" required>
            </div>
            <label class="form-check mb-3">
              <input type="checkbox" id="regAgree" required>
              Я согласен с <a href="#" class="form-link">условиями использования</a>
            </label>
            <button type="submit" class="btn btn-primary w-100 btn-lg">Создать аккаунт</button>
            <div class="form-divider">или</div>
            <div style="text-align:center; font-size:0.9rem;">
              Уже есть аккаунт? <a href="login.html" class="form-link">Войти</a>
            </div>
          </form>
        </div>
      </div>
    </section>
  </main>
  <div id="app-footer"></div>
  <div id="toast-container"></div>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
    function pageInit() {
      if (Storage.auth.isLoggedIn()) {
        window.location.href = "profile.html";
        return;
      }
      let selectedAvatar = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`;

      document.getElementById("registerForm").addEventListener("submit", function(e) {
        e.preventDefault();
        const alertEl = document.getElementById("registerAlert");
        const password = document.getElementById("regPassword").value;
        const password2 = document.getElementById("regPassword2").value;
        if (password !== password2) {
          alertEl.style.display = "flex";
          alertEl.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> Пароли не совпадают`;
          return;
        }
        const result = Storage.auth.register({
          name: document.getElementById("regFirstName").value + " " + document.getElementById("regLastName").value,
          email: document.getElementById("regEmail").value,
          password,
          avatar: selectedAvatar
        });
        if (result.success) {
          showToast("Аккаунт успешно создан!", "success");
          setTimeout(() => window.location.href = "profile.html", 800);
        } else {
          alertEl.style.display = "flex";
          alertEl.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg> ${result.message}`;
        }
      });
    }
  </script>
</body>
</html>
