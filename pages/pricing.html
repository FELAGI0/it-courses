<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тарифы — ITКурсы</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <div id="app-header"></div>
  <main>
    <div class="page-hero">
      <div class="container">
        <div class="breadcrumb"><a href="../index.html">Главная</a><span class="breadcrumb-sep">›</span>Тарифы</div>
        <h1>Выберите тариф</h1>
        <p>Прозрачные цены без скрытых платежей</p>
      </div>
    </div>
    <section class="section">
      <div class="container">
        <div style="text-align:center; margin-bottom:48px;">
          <div style="display:inline-flex; background:var(--bg-secondary); border-radius:100px; padding:4px; gap:4px;">
            <button class="filter-btn active" id="periodMonth" onclick="setPeriod('month')">Ежемесячно</button>
            <button class="filter-btn" id="periodYear" onclick="setPeriod('year')">Ежегодно <span style="color:var(--success); font-size:0.78rem; font-weight:700;">-30%</span></button>
          </div>
        </div>
        <div class="pricing-grid" id="pricingGrid"></div>
        <div style="margin-top:64px;">
          <div class="section-header">
            <h2 class="section-title">Сравнение тарифов</h2>
          </div>
          <div style="overflow-x:auto;">
            <table style="width:100%; border-collapse:collapse; background:var(--bg-card); border-radius:var(--radius-lg); overflow:hidden; box-shadow:var(--shadow);">
              <thead>
                <tr style="background:var(--bg-secondary);">
                  <th style="padding:16px 20px; text-align:left; font-size:0.9rem;">Функция</th>
                  <th style="padding:16px 20px; text-align:center; font-size:0.9rem;">Бесплатный</th>
                  <th style="padding:16px 20px; text-align:center; font-size:0.9rem; color:var(--primary);">Pro</th>
                  <th style="padding:16px 20px; text-align:center; font-size:0.9rem; color:var(--secondary);">Business</th>
                </tr>
              </thead>
              <tbody id="comparisonTable"></tbody>
            </table>
          </div>
        </div>
        <div style="text-align:center; margin-top:60px; padding:40px; background:linear-gradient(135deg,var(--primary),var(--secondary)); border-radius:var(--radius-xl); color:#fff;">
          <h3 style="font-size:1.6rem; font-weight:900; margin-bottom:10px;">30-дневная гарантия возврата</h3>
          <p style="opacity:0.85; margin-bottom:24px;">Не понравилось — вернём деньги без вопросов</p>
          <a href="register.html" class="btn btn-lg" style="background:#fff; color:var(--primary);">Начать бесплатно</a>
        </div>
      </div>
    </section>
  </main>
  <div id="app-footer"></div>
  <div id="toast-container"></div>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
    let currentPeriod = "month";

    function setPeriod(period) {
      currentPeriod = period;
      document.getElementById("periodMonth").classList.toggle("active", period === "month");
      document.getElementById("periodYear").classList.toggle("active", period === "year");
      renderPricing();
    }

    function renderPricing() {
      const grid = document.getElementById("pricingGrid");
      grid.innerHTML = PRICING_PLANS.map(plan => {
        const price = currentPeriod === "year" && plan.price > 0 ? Math.round(plan.price * 0.7) : plan.price;
        return `
          <div class="pricing-card ${plan.featured ? "featured" : ""}">
            ${plan.featured ? '<div class="pricing-badge">🔥 Популярный</div>' : ""}
            <div class="pricing-name" style="color:${plan.color};">${plan.name}</div>
            <div class="pricing-price">
              <span class="pricing-amount">${price === 0 ? "0 ₽" : new Intl.NumberFormat("ru-RU").format(price) + " ₽"}</span>
              <span class="pricing-period"> / ${currentPeriod === "year" ? "год" : plan.period}</span>
            </div>
            <div class="pricing-desc">${plan.description}</div>
            <div class="pricing-features">
              ${plan.features.map(f => `
                <div class="pricing-feature ${f.included ? "included" : "excluded"}">
                  <span class="pricing-feature-icon">${f.included ? "✅" : "❌"}</span>
                  ${f.text}
                </div>
              `).join("")}
            </div>
            <a href="${plan.id === "free" ? "register.html" : "register.html"}" class="btn ${plan.featured ? "btn-primary" : "btn-outline"} w-100 btn-lg">
              ${plan.id === "free" ? "Начать бесплатно" : "Выбрать тариф"}
            </a>
          </div>
        `;
      }).join("");

      const tbody = document.getElementById("comparisonTable");
      if (tbody) {
        const allFeatures = PRICING_PLANS[2].features.map(f => f.text);
        tbody.innerHTML = allFeatures.map((feature, i) => `
          <tr style="border-bottom:1px solid var(--border);">
            <td style="padding:14px 20px; font-size:0.9rem;">${feature}</td>
            ${PRICING_PLANS.map(plan => `<td style="padding:14px 20px; text-align:center; font-size:1rem;">${plan.features[i]?.included ? "✅" : "—"}</td>`).join("")}
          </tr>
        `).join("");
      }
    }

    function pageInit() { renderPricing(); }
  </script>
</body>
</html>
