<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Контакты — ITКурсы</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <div id="app-header"></div>
  <main>
    <div class="page-hero">
      <div class="container">
        <div class="breadcrumb"><a href="../index.html">Главная</a><span class="breadcrumb-sep">›</span>Контакты</div>
        <h1>Свяжитесь с нами</h1>
        <p>Мы ответим на все ваши вопросы</p>
      </div>
    </div>
    <section class="section">
      <div class="container">
        <div class="contact-grid">
          <div>
            <h2 style="font-size:1.6rem; font-weight:800; margin-bottom:28px; letter-spacing:-0.02em;">Напишите нам</h2>
            <div class="contact-info" style="margin-bottom:40px; display:flex; flex-direction:column; gap:20px;">
              <div style="display:flex; gap:16px; align-items:flex-start;">
                <div style="width:48px; height:48px; border-radius:var(--radius-sm); background:var(--primary-bg); color:var(--primary); display:flex; align-items:center; justify-content:center; flex-shrink:0;">
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                </div>
                <div>
                  <div style="font-size:0.85rem; color:var(--text-muted); margin-bottom:4px;">Email</div>
                  <div style="font-weight:600; font-size:0.97rem;">support@itkursy.ru</div>
                </div>
              </div>
              <div style="display:flex; gap:16px; align-items:flex-start;">
                <div style="width:48px; height:48px; border-radius:var(--radius-sm); background:var(--primary-bg); color:var(--primary); display:flex; align-items:center; justify-content:center; flex-shrink:0;">
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                </div>
                <div>
                  <div style="font-size:0.85rem; color:var(--text-muted); margin-bottom:4px;">Телефон</div>
                  <div style="font-weight:600; font-size:0.97rem;">+7 (800) 555-35-35</div>
                </div>
              </div>
              <div style="display:flex; gap:16px; align-items:flex-start;">
                <div style="width:48px; height:48px; border-radius:var(--radius-sm); background:var(--primary-bg); color:var(--primary); display:flex; align-items:center; justify-content:center; flex-shrink:0;">
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                </div>
                <div>
                  <div style="font-size:0.85rem; color:var(--text-muted); margin-bottom:4px;">Часы работы</div>
                  <div style="font-weight:600; font-size:0.97rem;">Пн–Пт: 9:00–20:00</div>
                </div>
              </div>
              <div style="display:flex; gap:16px; align-items:flex-start;">
                <div style="width:48px; height:48px; border-radius:var(--radius-sm); background:var(--primary-bg); color:var(--primary); display:flex; align-items:center; justify-content:center; flex-shrink:0;">
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                </div>
                <div>
                  <div style="font-size:0.85rem; color:var(--text-muted); margin-bottom:4px;">Адрес</div>
                  <div style="font-weight:600; font-size:0.97rem;">Москва, ул. Тверская, 12</div>
                </div>
              </div>
            </div>
          </div>
          <div class="form-card" style="max-width:none;">
            <h3 style="font-size:1.2rem; font-weight:700; margin-bottom:28px;">Отправить сообщение</h3>
            <form id="contactForm">
              <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
                <div class="form-group">
                  <label class="form-label">Ваше имя</label>
                  <input type="text" class="form-control" id="contactName" placeholder="Иван Петров" required>
                </div>
                <div class="form-group">
                  <label class="form-label">Email</label>
                  <input type="email" class="form-control" id="contactEmail" placeholder="ivan@example.com" required>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Тема</label>
                <select class="form-control" id="contactSubject">
                  <option>Технический вопрос</option>
                  <option>Вопрос об оплате</option>
                  <option>Сотрудничество</option>
                  <option>Стать преподавателем</option>
                  <option>Другое</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Сообщение</label>
                <textarea class="form-control" id="contactMessage" rows="5" placeholder="Опишите ваш вопрос или предложение..." required></textarea>
              </div>
              <button type="submit" class="btn btn-primary btn-lg w-100">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                Отправить сообщение
              </button>
            </form>
          </div>
        </div>
      </div>
    </section>
  </main>
  <div id="app-footer"></div>
  <div id="toast-container"></div>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
    function pageInit() {
      document.getElementById("contactForm").addEventListener("submit", function(e) {
        e.preventDefault();
        showToast("Сообщение отправлено! Мы ответим в течение 2 часов.", "success");
        this.reset();
      });
    }
  </script>
</body>
</html>
