<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Корзина — ITКурсы</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <div id="app-header"></div>
  <main>
    <div class="page-hero">
      <div class="container">
        <div class="breadcrumb"><a href="../index.html">Главная</a><span class="breadcrumb-sep">›</span>Корзина</div>
        <h1>Корзина</h1>
        <p id="cartSubtitle">Ваши выбранные курсы</p>
      </div>
    </div>
    <section style="padding: 48px 0 100px;">
      <div class="container">
        <div id="cartContent"></div>
      </div>
    </section>
  </main>
  <div id="app-footer"></div>
  <div id="toast-container"></div>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
    function pageInit() {
      renderCart();
    }

    function renderCart() {
      const cartIds = Storage.cart.getCart();
      const container = document.getElementById("cartContent");
      const subtitle = document.getElementById("cartSubtitle");

      if (cartIds.length === 0) {
        subtitle.textContent = "Корзина пуста";
        container.innerHTML = `
          <div class="empty-state">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:20px;"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
            <h3>Корзина пуста</h3>
            <p>Добавьте курсы из каталога, чтобы начать обучение</p>
            <a href="catalog.html" class="btn btn-primary btn-lg">Перейти в каталог</a>
          </div>
        `;
        return;
      }

      const courses = cartIds.map(id => COURSES.find(c => c.id === id)).filter(Boolean);
      const total = Storage.cart.getTotal();
      const oldTotal = courses.reduce((s, c) => s + (c.oldPrice || c.price), 0);
      const savings = oldTotal - total;
      subtitle.textContent = `${courses.length} ${courses.length === 1 ? "курс" : "курса"} в корзине`;

      container.innerHTML = `
        <div class="cart-layout">
          <div>
            <div id="cartItems">
              ${courses.map(course => `
                <div class="cart-item" data-id="${course.id}">
                  <div class="cart-item__icon" style="background: linear-gradient(135deg, ${course.color}18, ${course.color}30)">
                    ${course.icon ? course.icon.replace(/width="52"/g, 'width="32"').replace(/height="52"/g, 'height="32"') : ''}
                  </div>
                  <div class="cart-item__info">
                    <a href="course.html?id=${course.id}" class="cart-item__title">${course.title}</a>
                    <div class="cart-item__meta">
                      <span>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
                        ${course.instructor}
                      </span>
                      <span>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                        ${course.duration}
                      </span>
                      <span class="badge badge-primary">${course.level}</span>
                    </div>
                    <div style="margin-top:8px;">${renderStars(course.rating)} <span style="font-size:0.8rem; color:var(--text-muted);">(${course.students.toLocaleString("ru-RU")})</span></div>
                  </div>
                  <div class="cart-item__price">${formatPrice(course.price)}</div>
                  <button class="cart-item__remove" data-id="${course.id}" title="Удалить">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                  </button>
                </div>
              `).join("")}
            </div>
            <div style="display:flex; gap:14px; flex-wrap:wrap; margin-top:28px;">
              <button class="btn btn-outline btn--danger" id="clearCartBtn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                Очистить корзину
              </button>
              <a href="catalog.html" class="btn btn-outline">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
                Продолжить выбор
              </a>
            </div>
          </div>
          <div class="cart-summary">
            <h3 class="cart-summary__title">Итого к оплате</h3>
            ${savings > 0 ? `<div class="cart-summary__savings">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 12v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-8"/><path d="M16 6l-4-4-4 4"/><path d="M12 2v11"/></svg>
              Вы экономите ${formatPrice(savings)}!
            </div>` : ""}
            <div class="summary-row"><span>Курсов:</span><span>${courses.length}</span></div>
            ${savings > 0 ? `
            <div class="summary-row"><span>Стоимость без скидки:</span><span>${formatPrice(oldTotal)}</span></div>
            <div class="summary-row" style="color:var(--success);"><span>Скидка:</span><span>− ${formatPrice(savings)}</span></div>` : ""}
            <div class="summary-row summary-row--total"><span>Итого:</span><span>${formatPrice(total)}</span></div>
            <button class="btn btn-primary w-100 btn-lg mt-3" id="checkoutBtn">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
              Перейти к оплате
            </button>
            <div style="text-align:center; font-size:0.8rem; color:var(--text-muted); margin-top:14px;">30-дневная гарантия возврата</div>
            <hr style="border:none; border-top:1px solid var(--border); margin:20px 0;">
            <div style="display:flex; flex-direction:column; gap:10px;">
              <div style="display:flex; align-items:center; gap:8px; font-size:0.86rem; color:var(--text-muted);">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                Пожизненный доступ
              </div>
              <div style="display:flex; align-items:center; gap:8px; font-size:0.86rem; color:var(--text-muted);">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                Сертификат об окончании
              </div>
              <div style="display:flex; align-items:center; gap:8px; font-size:0.86rem; color:var(--text-muted);">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                Поддержка преподавателя
              </div>
            </div>
          </div>
        </div>
      `;

      document.querySelectorAll(".cart-item__remove").forEach(btn => {
        btn.addEventListener("click", () => {
          const id = parseInt(btn.dataset.id);
          Storage.cart.removeFromCart(id);
          showToast("Курс удалён из корзины", "info");
          updateCartBadge();
          renderCart();
        });
      });

      document.getElementById("clearCartBtn")?.addEventListener("click", () => {
        Storage.cart.clearCart();
        showToast("Корзина очищена", "info");
        updateCartBadge();
        renderCart();
      });

      document.getElementById("checkoutBtn")?.addEventListener("click", () => {
        if (!Storage.auth.isLoggedIn()) {
          showToast("Войдите в аккаунт для оплаты", "warning");
          setTimeout(() => window.location.href = "login.html", 1200);
        } else {
          const user = Storage.auth.getCurrentUser();
          const myCourses = [...(user.courses || []), ...Storage.cart.getCart()];
          const uniqueCourses = [...new Set(myCourses)];
          Storage.auth.updateUser({ courses: uniqueCourses });
          Storage.cart.clearCart();
          showToast("Оплата прошла успешно! Курсы добавлены в профиль", "success");
          updateCartBadge();
          setTimeout(() => renderCart(), 500);
        }
      });
    }
  </script>
</body>
</html>
